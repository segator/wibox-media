name: Firmware

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to attach assets to, for example v0.2.0"
        required: false
        type: string
      upload_to_release:
        description: "Upload image to the GitHub Release named by tag"
        required: true
        default: false
        type: boolean
  release:
    types: [published]

permissions:
  contents: write
  packages: read

concurrency:
  group: firmware-${{ github.ref }}
  cancel-in-progress: false

jobs:
  firmware:
    name: Build firmware image
    runs-on: ubuntu-24.04
    env:
      WIBOX_BUILD_IMAGE: ${{ vars.WIBOX_BUILD_IMAGE || 'ghcr.io/segator/wibox-build:latest' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ca-certificates

      - name: Log in to GHCR
        env:
          GHCR_READ_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          token="${GHCR_READ_TOKEN:-${GITHUB_TOKEN}}"
          if [ -n "${token}" ]; then
            echo "${token}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          fi

      - name: Build project Docker image
        run: |
          docker build \
            --build-arg BASE_IMAGE="${WIBOX_BUILD_IMAGE}" \
            -t wibox-build-tool:latest .

      - name: Resolve build metadata
        id: metadata
        shell: bash
        run: |
          set -euo pipefail
          timestamp=$(date -u +%Y%m%d%H%M%S)
          iso_timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          if [ "${GITHUB_EVENT_NAME}" = "release" ]; then
            version="${GITHUB_REF_NAME#wibox-media-}"
            artifact_tag="${GITHUB_REF_NAME}"
          elif [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ] && [ -n "${{ inputs.tag }}" ]; then
            version="${{ inputs.tag }}"
            version="${version#wibox-media-}"
            artifact_tag="${{ inputs.tag }}"
          else
            version="dev-${timestamp}"
            artifact_tag="${version}"
          fi
          safe_tag=$(printf "%s" "${artifact_tag#wibox-media-}" | tr -c 'A-Za-z0-9._-' '-')
          {
            echo "version=${version}"
            echo "commit=${GITHUB_SHA::12}"
            echo "build_timestamp=${iso_timestamp}"
            echo "artifact_tag=${artifact_tag}"
            echo "safe_tag=${safe_tag}"
          } >> "${GITHUB_OUTPUT}"

      - name: Build and verify firmware
        env:
          WIBOX_VERSION: ${{ steps.metadata.outputs.version }}
          WIBOX_COMMIT: ${{ steps.metadata.outputs.commit }}
          WIBOX_BUILD_TIMESTAMP: ${{ steps.metadata.outputs.build_timestamp }}
        run: |
          make test
          WIBOX_VERSION="${WIBOX_VERSION}" \
            WIBOX_COMMIT="${WIBOX_COMMIT}" \
            WIBOX_BUILD_TIMESTAMP="${WIBOX_BUILD_TIMESTAMP}" \
            make build
          make verify-image

      - name: Package firmware artifact
        id: package
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.metadata.outputs.artifact_tag }}"
          image="wibox-media-${{ steps.metadata.outputs.safe_tag }}.img"
          cp -L release/latest "${image}"
          sha256sum "${image}" > SHA256SUMS
          md5sum "${image}" > MD5SUMS
          {
            echo "tag=${tag}"
            echo "safe_tag=${{ steps.metadata.outputs.safe_tag }}"
            echo "image=${image}"
          } >> "${GITHUB_OUTPUT}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-image-${{ steps.package.outputs.safe_tag }}
          path: |
            ${{ steps.package.outputs.image }}
            SHA256SUMS
            MD5SUMS
          if-no-files-found: error

      - name: Upload image to GitHub Release
        if: ${{ github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.upload_to_release && inputs.tag != '') }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.package.outputs.tag }}
          files: |
            ${{ steps.package.outputs.image }}
            SHA256SUMS
            MD5SUMS
